<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello, Cloudflare Pages</title>
    <meta name="description" content="A tiny test site deployed on Cloudflare Pages." />
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0b0d12;
        --fg: #f4f4f5;
        --muted: #a1a1aa;
        --accent: #f6821f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter",
          "Pretendard", system-ui, sans-serif;
        background:
          radial-gradient(
            circle at 20% 10%,
            rgba(246, 130, 31, 0.18),
            transparent 45%
          ),
          radial-gradient(
            circle at 80% 90%,
            rgba(246, 130, 31, 0.12),
            transparent 50%
          ),
          var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 560px;
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.85rem;
        border-radius: 999px;
        background: rgba(246, 130, 31, 0.12);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 1px solid rgba(246, 130, 31, 0.35);
      }
      .badge::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 4px rgba(246, 130, 31, 0.18);
      }
      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        margin: 1.25rem 0 0.75rem;
        letter-spacing: -0.02em;
        line-height: 1.1;
      }
      p {
        color: var(--muted);
        line-height: 1.65;
        margin: 0 0 1.5rem;
      }
      .meta {
        margin-top: 2rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        font-size: 0.85rem;
      }
      .card {
        padding: 0.85rem 1rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: left;
      }
      .card .label {
        color: var(--muted);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .card .value {
        margin-top: 0.25rem;
        font-weight: 600;
        font-feature-settings: "tnum";
      }
      footer {
        margin-top: 2rem;
        font-size: 0.75rem;
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Hyunseok · Auto Deploy v2</span>
      <h1>안녕하세요, 정현석입니다.</h1>
      <p>
        이 페이지는 GitHub에 푸시할 때마다 Cloudflare Pages가 자동으로
        전 세계 엣지에 배포해 줍니다. 지금 보고 계신 화면도 방금 main
        브랜치에 머지된 결과입니다.
      </p>
      <div class="meta">
        <div class="card">
          <div class="label">Deployed</div>
          <div class="value" id="deployed">—</div>
        </div>
        <div class="card">
          <div class="label">Local time</div>
          <div class="value" id="now">—</div>
        </div>
      </div>
      <footer>
        Built with
        <a href="https://developers.cloudflare.com/pages/" target="_blank"
          >Cloudflare Pages</a
        >
        · deployed via wrangler
      </footer>
    </main>
    <script>
      const fmt = new Intl.DateTimeFormat("ko-KR", {
        dateStyle: "medium",
        timeStyle: "medium",
      });
      document.getElementById("deployed").textContent = fmt.format(
        new Date(document.lastModified),
      );
      const tick = () => {
        document.getElementById("now").textContent = fmt.format(new Date());
      };
      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
